<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Rápido Kensei</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #080c10;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #4a8ab8;
            text-transform: uppercase;
        }

        p {
            font-size: 24px;
            font-weight: 300;
            color: #a0aec0;
            letter-spacing: 1px;
        }

        .status {
            margin-top: 30px;
            padding: 15px 30px;
            background: rgba(74, 138, 184, 0.1);
            border: 1px solid #4a8ab8;
            border-radius: 8px;
            display: inline-block;
        }

        .status-text {
            font-size: 18px;
            font-weight: 500;
            color: #4a8ab8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Rápido Kensei</h1>
        <p>Sistema Operativo</p>
        <div class="status">
            <span class="status-text">✓ Sistema Activo</span>
        </div>
    </div>
</body>
</html>
